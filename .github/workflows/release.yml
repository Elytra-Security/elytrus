name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2026.01)'
        required: true

permissions:
  contents: write

jobs:
  validate-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Elytrus
        run: curl -sSfL https://raw.githubusercontent.com/Elytra-Security/elytrus/main/install.sh | sh
      - name: Validate rules
        run: elytrus rules validate
