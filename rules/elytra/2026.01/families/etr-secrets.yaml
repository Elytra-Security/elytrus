rules:
  - id: ETR-SECRETS-001
    version: "2026.01"
    title: No secrets in source or repository artifacts
    family: ETR-SECRETS
    severity: critical
    status: stable
    default_outcome_mode:
      local: warn
      strict: fail
      release: fail
    objective: >
      Detect secrets, credentials, API keys, and tokens committed to the
      repository or present in repository artifacts.
    risk_statement: >
      Committed secrets provide attackers with persistent access to systems,
      cloud services, and databases even after secrets are rotated in some
      environments.
    applies_to:
      stacks: [all]
      files: ["**/*"]
    tools:
      primary: [gitleaks]
      secondary: [trivy]
    technical_checks:
      - gitleaks detect --source . --report-format json --exclude-path .elytrus
    exclusions:
      - .elytrus/ is always excluded from secret scanning. Evidence bundles written
        there may contain redacted examples of prior findings; rescanning them would
        produce false positives on every subsequent run.
    pass_condition: No secrets detected in repository history or working tree.
    fail_condition: Secrets detected in source code or repository history.
    warn_condition: Potential secrets detected; manual review recommended.
    evidence:
      raw: [raw/gitleaks.json]
      normalized: [findings.json]
    exception:
      allowed: true
      requirements: [finding_id, reason, risk_owner, approver, expires_at, compensating_control]
    mappings:
      iso27001: [A.8.13, A.9.4]
      cwe: [CWE-312, CWE-798]
      owasp: [A02:2021]
    implementation:
      status: planned
    remediation:
      summary: Remove the secret from source code and rotate the credential.
      steps:
        - Remove the secret from the file immediately.
        - Rotate the credential because the existing one must be considered compromised.
        - Use environment variables or a secrets manager instead.
        - If committed to git history use `git filter-repo` to purge the history.
        - Add the file pattern to .gitignore to prevent recurrence.
      references:
        - https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/removing-sensitive-data-from-a-repository

  - id: ETR-SECRETS-002
    version: "2026.01"
    title: Secrets must be redacted in reports
    family: ETR-SECRETS
    severity: high
    status: stable
    default_outcome_mode:
      local: pass
      strict: fail
      release: fail
    objective: >
      Ensure secret values are redacted in report.md and findings.json
      while retained in the access-controlled raw evidence file.
    risk_statement: >
      Unredacted secrets in report artifacts may be exposed through
      log aggregation, CI output, or insecure sharing.
    applies_to:
      stacks: [all]
      files: ["**/*"]
    tools:
      primary: []
      secondary: []
    pass_condition: >
      Findings with category=secrets have evidence field replaced with
      [REDACTED] in report.md and findings.json.
    fail_condition: >
      Secret values appear unredacted in report.md or findings.json.
    warn_condition: ""
    evidence:
      raw: [raw/gitleaks.json]
      normalized: [findings.json]
    exception:
      allowed: false
      requirements: []
    mappings:
      iso27001: [A.8.13]
      cwe: [CWE-312]
      owasp: [A02:2021]
    implementation:
      status: planned
    remediation:
      summary: Ensure secret values are redacted in all report output.
      steps:
        - Mark findings with category=secrets so the report renderer redacts them.
        - Never include raw secret values in finding Evidence fields.
      references:
        - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
